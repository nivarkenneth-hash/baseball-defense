<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#082d22">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Defensa Baseball">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Defensa de Béisbol — 200 jugadas</title>
<style>
:root{--bg:#082d22;--panel:#123f32;--gold:#f7c948;--red:#e74c3c;--blue:#123a70;--runner:#f39c12;--white:#fff;--muted:#cfe6dd}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:#fff;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);-webkit-tap-highlight-color:transparent}
.app{max-width:780px;margin:auto;padding:15px 12px 35px}h1{text-align:center;margin:3px 0 5px}.intro{text-align:center;color:var(--muted);margin:0 0 13px}
.filters{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:9px}.filters input,.filters select,#playSelect{width:100%;padding:11px;border-radius:11px;background:#124a3a;color:#fff;border:1px solid #2a6f5b;font-weight:700}
#playSelect{margin-bottom:10px}.count{font-size:12px;color:#d9eee6;text-align:right;margin:-3px 2px 8px}
.field{position:relative;aspect-ratio:1;border:3px solid #e8c17a;border-radius:20px;overflow:hidden;background:#1d7048}.field svg{position:absolute;inset:0;width:100%;height:100%}
.player,.runner{position:absolute;display:flex;align-items:center;justify-content:center;transform:translate(-50%,-50%);z-index:4;box-shadow:0 4px 10px rgba(0,0,0,.3)}
.player{width:34px;height:34px;border-radius:50%;background:var(--blue);border:2px solid white;font-weight:900;font-size:12px;transition:left 1.15s ease,top 1.15s ease}
.runner{width:29px;height:29px;border-radius:8px;background:var(--runner);border:2px solid white;font-weight:900;font-size:10px}
.ball{position:absolute;width:12px;height:12px;border-radius:50%;background:white;border:2px solid #d33;transform:translate(-50%,-50%);z-index:5;transition:left 1.15s linear,top 1.15s linear}
.controls{display:flex;gap:9px;margin-top:11px}.controls button{flex:1;padding:12px;border:0;border-radius:11px;color:white;font-weight:900}.play{background:var(--red)}.reset{background:#245b4a}
.meta{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px}.badge{background:#0f4b3a;border:1px solid #2a6f5b;padding:7px 10px;border-radius:999px;color:#dcefe7;font-size:12px}
.card{background:var(--panel);border-left:5px solid var(--gold);border-radius:13px;padding:13px;margin-top:12px}.card small{color:var(--gold);font-weight:900}.card strong{display:block;margin-top:4px;font-size:17px}
.summary{color:#d6e9e2;line-height:1.4;margin:9px 0 0;font-size:14px}.positions{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}.positions button{width:47px;height:42px;border-radius:11px;border:1px solid #2a6f5b;background:#124a3a;color:white;font-weight:900}.positions button.active{background:#fff;color:var(--blue)}
.explanation{background:#fff;color:#263e36;border-radius:13px;padding:14px;margin-top:10px;line-height:1.45}.explanation h2{color:var(--blue);margin:0 0 5px}
.legend{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;color:var(--muted);font-size:12px;margin-top:9px}.dot,.square,.ballmini{display:inline-block;vertical-align:middle;margin-right:4px}.dot{width:14px;height:14px;border-radius:50%;background:var(--blue);border:1px solid #fff}.square{width:14px;height:14px;border-radius:4px;background:var(--runner);border:1px solid #fff}.ballmini{width:12px;height:12px;border-radius:50%;background:#fff;border:2px solid #d33}
.note{font-size:11px;color:#a9c9bd;text-align:center;line-height:1.45;margin-top:15px}
@media(max-width:500px){h1{font-size:24px}.filters{grid-template-columns:1fr}.player{width:30px;height:30px;font-size:10px}.runner{width:26px;height:26px}.controls{position:sticky;bottom:6px;z-index:20;background:rgba(8,45,34,.94);padding:7px;border-radius:13px}}
</style>
</head>
<body>
<main class="app">
<h1>Defensa de Béisbol</h1>
<p class="intro">200 escenarios defensivos con corredores, outs, cortes y respaldos.</p>

<div class="filters">
<input id="searchInput" placeholder="Buscar: shortstop, bunt, left field...">
<select id="categoryFilter"><option value="">Todas las categorías</option></select>
<select id="runnerFilter"><option value="">Todas las situaciones de corredores</option></select>
<select id="outsFilter"><option value="">Todos los outs</option></select>
</div>
<select id="playSelect"></select>
<div class="count" id="countText"></div>

<div class="field" id="field">
<svg viewBox="0 0 100 100">
<rect width="100" height="100" fill="#1D7048"/><path d="M50 91 L7 36 Q50 -5 93 36 Z" fill="#2F8F5B"/>
<polygon points="50,90 25,65 50,40 75,65" fill="#C79A63"/><polygon points="50,88 28,66 50,44 72,66" fill="#3C955E"/>
<path d="M50 90 L8 37M50 90 L92 37" stroke="#fff" stroke-width=".8"/><circle cx="50" cy="66" r="3.2" fill="#C79A63"/>
<polygon points="50,88 48,90 50,92 52,90" fill="#fff"/><polygon points="73,64 75,66 73,68 71,66" fill="#fff"/>
<polygon points="50,42 52,44 50,46 48,44" fill="#fff"/><polygon points="27,64 29,66 27,68 25,66" fill="#fff"/>
</svg>
</div>

<div class="legend"><span><i class="dot"></i>Defensor</span><span><i class="square"></i>Corredor</span><span><i class="ballmini"></i>Pelota</span></div>
<div class="controls"><button class="play" id="playBtn">▶ Reproducir</button><button class="reset" id="resetBtn">↺ Reiniciar</button></div>

<div class="meta"><span class="badge" id="categoryText"></span><span class="badge" id="runnersText"></span><span class="badge" id="outsText"></span></div>
<div class="card"><small>TIRO PRINCIPAL</small><strong id="throwText"></strong><p class="summary" id="summaryText"></p></div>
<div class="positions" id="positionButtons"></div>
<div class="explanation"><h2 id="positionTitle">SS</h2><div id="positionDuty"></div></div>
<p class="note">Las rutas son guías educativas simplificadas para uso personal. Un entrenador puede usar variantes según edad, fuerza de brazo, profundidad y sistema defensivo.</p>
</main>

<script src="plays.js"></script>
<script>
const POS=["P","C","1B","2B","3B","SS","LF","CF","RF"];
const HOME={P:[50,66],C:[50,91],"1B":[72,68],"2B":[61,52],"3B":[28,68],SS:[39,52],LF:[22,27],CF:[50,17],RF:[78,27]};
const BASES={first:[73,66],second:[50,44],third:[27,66]};
const field=document.getElementById("field"),playSelect=document.getElementById("playSelect");
const playerNodes={},runnerNodes={};let ballNode,filtered=[...PLAYS],current=PLAYS[0],selected="SS";

POS.forEach(p=>{const e=document.createElement("div");e.className="player";e.textContent=p;field.appendChild(e);playerNodes[p]=e;
 const b=document.createElement("button");b.textContent=p;b.onclick=()=>{selected=p;renderDuty();renderPositionButtons()};document.getElementById("positionButtons").appendChild(b)});
["first","second","third"].forEach(base=>{const e=document.createElement("div");e.className="runner";e.textContent="R";e.style.display="none";field.appendChild(e);runnerNodes[base]=e});
ballNode=document.createElement("div");ballNode.className="ball";field.appendChild(ballNode);

function unique(key){return [...new Set(PLAYS.map(p=>p[key]))].sort()}
unique("category").forEach(v=>categoryFilter.add(new Option(v,v)));
unique("runnersLabel").forEach(v=>runnerFilter.add(new Option(v,v)));
unique("outs").forEach(v=>outsFilter.add(new Option(v,v)));

function move(el,pt){el.style.left=pt[0]+"%";el.style.top=pt[1]+"%"}
function reset(){POS.forEach(p=>move(playerNodes[p],HOME[p]));move(ballNode,[50,86]);renderRunners()}
function play(){POS.forEach(p=>move(playerNodes[p],current.moves[p].to));move(ballNode,current.ball)}
function renderRunners(){["first","second","third"].forEach(base=>{const on=current.runners.includes(base);runnerNodes[base].style.display=on?"flex":"none";if(on)move(runnerNodes[base],BASES[base])})}
function renderPositionButtons(){[...positionButtons.children].forEach(b=>b.classList.toggle("active",b.textContent===selected))}
function renderDuty(){positionTitle.textContent=selected;positionDuty.textContent=current.moves[selected].duty}
function renderCurrent(){current=filtered[+playSelect.value]||filtered[0]||PLAYS[0];categoryText.textContent=current.category;runnersText.textContent=current.runnersLabel;outsText.textContent="Outs: "+current.outs;throwText.textContent=current.throw;summaryText.textContent=current.summary;reset();renderDuty();renderPositionButtons()}
function applyFilters(){
 const q=searchInput.value.trim().toLowerCase(),cat=categoryFilter.value,run=runnerFilter.value,out=outsFilter.value;
 filtered=PLAYS.filter(p=>(!q||(p.name+" "+p.category+" "+p.throw).toLowerCase().includes(q))&&(!cat||p.category===cat)&&(!run||p.runnersLabel===run)&&(!out||p.outs===out));
 playSelect.innerHTML="";filtered.forEach((p,i)=>playSelect.add(new Option(`${p.number}. ${p.name}`,i)));
 countText.textContent=`${filtered.length} de ${PLAYS.length} jugadas`;
 renderCurrent();
}
[searchInput,categoryFilter,runnerFilter,outsFilter].forEach(e=>e.addEventListener(e.tagName==="INPUT"?"input":"change",applyFilters));
playSelect.onchange=renderCurrent;playBtn.onclick=play;resetBtn.onclick=reset;applyFilters();

if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./service-worker.js").catch(()=>{}))}
</script>
</body></html>
